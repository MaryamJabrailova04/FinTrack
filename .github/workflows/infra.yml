name: infra

on:
  workflow_dispatch:
  push:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/infra.yml"

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init

      - name: Terraform format
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -input=false -var="admin_source_prefix=${{ secrets.ADMIN_SOURCE_PREFIX }}" -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" -var="sql_admin_password=${{ secrets.SQL_ADMIN_PASSWORD }}" -var="appgw_ssl_certificate_data=${{ secrets.APPGW_SSL_CERTIFICATE_DATA }}" -var="appgw_ssl_certificate_password=${{ secrets.APPGW_SSL_CERTIFICATE_PASSWORD }}"

      - name: Terraform apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve -input=false -var="admin_source_prefix=${{ secrets.ADMIN_SOURCE_PREFIX }}" -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" -var="sql_admin_password=${{ secrets.SQL_ADMIN_PASSWORD }}" -var="appgw_ssl_certificate_data=${{ secrets.APPGW_SSL_CERTIFICATE_DATA }}" -var="appgw_ssl_certificate_password=${{ secrets.APPGW_SSL_CERTIFICATE_PASSWORD }}"