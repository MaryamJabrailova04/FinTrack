name: infra

on:
  workflow_dispatch:
    inputs:
      apply:
        description: "Apply the saved Terraform plan after planning"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  push:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/infra.yml"

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          test -n "${{ secrets.AZURE_CREDENTIALS }}" || (echo "Missing AZURE_CREDENTIALS" && exit 1)
          test -n "${{ secrets.ADMIN_SOURCE_PREFIX }}" || (echo "Missing ADMIN_SOURCE_PREFIX" && exit 1)
          test -n "${{ secrets.SSH_PUBLIC_KEY }}" || (echo "Missing SSH_PUBLIC_KEY" && exit 1)
          test -n "${{ secrets.SQL_ADMIN_PASSWORD }}" || (echo "Missing SQL_ADMIN_PASSWORD" && exit 1)
          test -n "${{ secrets.APPGW_SSL_CERTIFICATE_DATA }}" || (echo "Missing APPGW_SSL_CERTIFICATE_DATA" && exit 1)

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform init

      - name: Terraform format
        run: terraform fmt -check -recursive

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        shell: bash
        run: |
          set +e
          terraform plan -detailed-exitcode -input=false -out=tfplan \
            -var="admin_source_prefix=${{ secrets.ADMIN_SOURCE_PREFIX }}" \
            -var="ssh_public_key=${{ secrets.SSH_PUBLIC_KEY }}" \
            -var="sql_admin_password=${{ secrets.SQL_ADMIN_PASSWORD }}" \
            -var="appgw_ssl_certificate_data=${{ secrets.APPGW_SSL_CERTIFICATE_DATA }}" \
            -var="appgw_ssl_certificate_password=${{ secrets.APPGW_SSL_CERTIFICATE_PASSWORD }}"
          code=$?
          set -e
          echo "exitcode=$code" >> "$GITHUB_OUTPUT"
          if [ "$code" -eq 0 ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "Terraform plan completed: no changes."
            exit 0
          fi
          if [ "$code" -eq 2 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Terraform plan completed: changes detected. Apply is manual only."
            exit 0
          fi
          echo "Terraform plan failed."
          exit "$code"

      - name: Terraform apply
        if: github.event_name == 'workflow_dispatch' && inputs.apply == 'true' && steps.plan.outputs.has_changes == 'true'
        run: terraform apply -auto-approve -input=false tfplan

      - name: Skip apply summary
        if: steps.plan.outputs.has_changes == 'true' && !(github.event_name == 'workflow_dispatch' && inputs.apply == 'true')
        shell: bash
        run: |
          echo "Terraform detected changes, but apply was skipped."
          echo "Run this workflow manually with apply=true only after confirming GitHub Actions uses the same Terraform state as the live deployment."