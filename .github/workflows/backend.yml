name: backend

on:
  workflow_dispatch:
  push:
    paths:
      - "FinTrack Backend/**"
      - ".github/workflows/backend.yml"

permissions:
  contents: read

jobs:
  test-scan-deploy:
    runs-on: ubuntu-latest
    env:
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          test -n "${{ secrets.ANSIBLE_HOST }}" || (echo "Missing ANSIBLE_HOST" && exit 1)
          test -n "${{ secrets.ANSIBLE_USER }}" || (echo "Missing ANSIBLE_USER" && exit 1)
          test -n "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" || (echo "Missing ANSIBLE_SSH_PRIVATE_KEY" && exit 1)
          test -n "${{ secrets.VM_USER }}" || (echo "Missing VM_USER" && exit 1)
          test -n "${{ secrets.BACKEND_PRIVATE_IP }}" || (echo "Missing BACKEND_PRIVATE_IP" && exit 1)

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        working-directory: "FinTrack Backend"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django tests
        working-directory: "FinTrack Backend"
        env:
          DJANGO_SECRET_KEY: test-secret
          DJANGO_DEBUG: "True"
        run: python manage.py test

      - name: SonarQube scan
        if: env.SONAR_HOST_URL != ''
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Configure SSH
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > ~/.ssh/ansible_key
          chmod 600 ~/.ssh/ansible_key
          ssh-keyscan -H "${{ secrets.ANSIBLE_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy backend through Ansible VM
        shell: bash
        env:
          ANSIBLE_HOST: ${{ secrets.ANSIBLE_HOST }}
          ANSIBLE_USER: ${{ secrets.ANSIBLE_USER }}
          VM_USER: ${{ secrets.VM_USER }}
          BACKEND_PRIVATE_IP: ${{ secrets.BACKEND_PRIVATE_IP }}
        run: |
          set -euo pipefail
          RSYNC_SSH="ssh -i ~/.ssh/ansible_key -o StrictHostKeyChecking=yes"
          SSH_CMD="ssh -i ~/.ssh/ansible_key -o StrictHostKeyChecking=yes"
          rsync -az --delete --exclude '.env' --exclude 'db.sqlite3' -e "$RSYNC_SSH" "FinTrack Backend/" "$ANSIBLE_USER@$ANSIBLE_HOST:/tmp/fintrack-backend-src/"
          $SSH_CMD "$ANSIBLE_USER@$ANSIBLE_HOST" "VM_USER='$VM_USER' BACKEND_PRIVATE_IP='$BACKEND_PRIVATE_IP' bash -s" <<'REMOTE'
          set -euo pipefail
          rsync -az --delete --exclude '.env' --exclude 'db.sqlite3' -e "ssh -o StrictHostKeyChecking=no" /tmp/fintrack-backend-src/ "$VM_USER@$BACKEND_PRIVATE_IP:/tmp/fintrack-backend/"
          ssh -o StrictHostKeyChecking=no "$VM_USER@$BACKEND_PRIVATE_IP" '
            sudo mkdir -p /opt/fintrack/backend &&
            sudo rsync -a --delete /tmp/fintrack-backend/ /opt/fintrack/backend/ &&
            sudo chown -R www-data:www-data /opt/fintrack/backend &&
            sudo /opt/fintrack/venv/bin/pip install -r /opt/fintrack/backend/requirements.txt &&
            sudo -u www-data /opt/fintrack/venv/bin/python /opt/fintrack/backend/manage.py migrate &&
            sudo -u www-data /opt/fintrack/venv/bin/python /opt/fintrack/backend/manage.py collectstatic --noinput &&
            sudo systemctl restart fintrack-backend &&
            curl -fsS http://127.0.0.1:8000/api/health/
          '
          REMOTE