name: backend

on:
  workflow_dispatch:
  push:
    paths:
      - "FinTrack Backend/**"
      - ".github/workflows/backend.yml"

permissions:
  contents: read

jobs:
  test-scan-deploy:
    runs-on: ubuntu-latest
    env:
      RESOURCE_GROUP: rg-3tier-group4f-dev-s79z
      BACKEND_VMSS: vmss-backend-group4f-dev
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          test -n "${{ secrets.AZURE_CREDENTIALS }}" || (echo "Missing AZURE_CREDENTIALS" && exit 1)

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        working-directory: "FinTrack Backend"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Django tests
        working-directory: "FinTrack Backend"
        env:
          DJANGO_SECRET_KEY: test-secret
          DJANGO_DEBUG: "True"
        run: python manage.py test

      - name: SonarQube scan
        if: env.SONAR_HOST_URL != ''
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy backend with VMSS run-command
        shell: bash
        run: |
          set -euo pipefail
          INSTANCE_ID=$(az vmss list-instances --resource-group "$RESOURCE_GROUP" --name "$BACKEND_VMSS" --query "[0].instanceId" -o tsv)
          test -n "$INSTANCE_ID" || (echo "No backend VMSS instance found" && exit 1)
          az vmss run-command invoke \
            --resource-group "$RESOURCE_GROUP" \
            --name "$BACKEND_VMSS" \
            --instance-id "$INSTANCE_ID" \
            --command-id RunShellScript \
            --scripts "
              set -euo pipefail
              sudo apt-get update -y
              sudo apt-get install -y git rsync curl ca-certificates
              rm -rf /tmp/fintrack-ci
              git clone --depth 1 https://github.com/MaryamJabrailova04/FinTrack.git /tmp/fintrack-ci
              sudo mkdir -p /opt/fintrack/backend
              sudo rsync -a --delete --exclude '.env' --exclude 'db.sqlite3' '/tmp/fintrack-ci/FinTrack Backend/' /opt/fintrack/backend/
              sudo chown -R www-data:www-data /opt/fintrack/backend
              sudo /opt/fintrack/venv/bin/pip install -r /opt/fintrack/backend/requirements.txt
              sudo -u www-data /opt/fintrack/venv/bin/python /opt/fintrack/backend/manage.py migrate
              sudo -u www-data /opt/fintrack/venv/bin/python /opt/fintrack/backend/manage.py collectstatic --noinput
              sudo systemctl restart fintrack-backend
              curl -fsS http://127.0.0.1:8000/api/health/
            "