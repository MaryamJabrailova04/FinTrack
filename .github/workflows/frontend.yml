name: frontend

on:
  workflow_dispatch:
  push:
    paths:
      - "FinTrack Frontend/**"
      - ".github/workflows/frontend.yml"

permissions:
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      RESOURCE_GROUP: rg-3tier-group4f-dev-s79z
      FRONTEND_VMSS: vmss-frontend-group4f-dev
      APPGW_URL: https://group4f-fintrack-s79z.centralindia.cloudapp.azure.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          test -n "${{ secrets.AZURE_CREDENTIALS }}" || (echo "Missing AZURE_CREDENTIALS" && exit 1)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: "FinTrack Frontend/package-lock.json"

      - name: Install dependencies
        working-directory: "FinTrack Frontend"
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: "FinTrack Frontend"
        env:
          VITE_API_URL: ${{ env.APPGW_URL }}/api
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: npm run build

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy frontend with VMSS run-command
        shell: bash
        run: |
          set -euo pipefail
          INSTANCE_ID=$(az vmss list-instances --resource-group "$RESOURCE_GROUP" --name "$FRONTEND_VMSS" --query "[0].instanceId" -o tsv)
          test -n "$INSTANCE_ID" || (echo "No frontend VMSS instance found" && exit 1)
          az vmss run-command invoke \
            --resource-group "$RESOURCE_GROUP" \
            --name "$FRONTEND_VMSS" \
            --instance-id "$INSTANCE_ID" \
            --command-id RunShellScript \
            --scripts "
              set -euo pipefail
              sudo apt-get update -y
              sudo apt-get install -y git curl ca-certificates rsync
              if ! command -v node >/dev/null 2>&1 || [ \"\$(node -v | cut -d. -f1 | tr -d v)\" -lt 20 ]; then
                curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
                sudo apt-get install -y nodejs
              fi
              rm -rf /tmp/fintrack-ci
              git clone --depth 1 https://github.com/MaryamJabrailova04/FinTrack.git /tmp/fintrack-ci
              cd '/tmp/fintrack-ci/FinTrack Frontend'
              npm ci --legacy-peer-deps
              VITE_API_URL='$APPGW_URL/api' VITE_GOOGLE_CLIENT_ID='${{ secrets.VITE_GOOGLE_CLIENT_ID }}' npm run build
              sudo mkdir -p /var/www/fintrack
              sudo rsync -a --delete build/ /var/www/fintrack/
              sudo chown -R www-data:www-data /var/www/fintrack
              sudo systemctl restart nginx
              curl -fsS http://127.0.0.1/healthz
            "