name: frontend

on:
  workflow_dispatch:
  push:
    paths:
      - "FinTrack Frontend/**"
      - ".github/workflows/frontend.yml"

permissions:
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        shell: bash
        run: |
          test -n "${{ secrets.ANSIBLE_HOST }}" || (echo "Missing ANSIBLE_HOST" && exit 1)
          test -n "${{ secrets.ANSIBLE_USER }}" || (echo "Missing ANSIBLE_USER" && exit 1)
          test -n "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" || (echo "Missing ANSIBLE_SSH_PRIVATE_KEY" && exit 1)
          test -n "${{ secrets.VM_USER }}" || (echo "Missing VM_USER" && exit 1)
          test -n "${{ secrets.FRONTEND_PRIVATE_IP }}" || (echo "Missing FRONTEND_PRIVATE_IP" && exit 1)

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: "FinTrack Frontend/package-lock.json"

      - name: Install dependencies
        working-directory: "FinTrack Frontend"
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: "FinTrack Frontend"
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
        run: npm run build

      - name: Configure SSH
        shell: bash
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > ~/.ssh/ansible_key
          chmod 600 ~/.ssh/ansible_key
          ssh-keyscan -H "${{ secrets.ANSIBLE_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy frontend through Ansible VM
        shell: bash
        env:
          ANSIBLE_HOST: ${{ secrets.ANSIBLE_HOST }}
          ANSIBLE_USER: ${{ secrets.ANSIBLE_USER }}
          VM_USER: ${{ secrets.VM_USER }}
          FRONTEND_PRIVATE_IP: ${{ secrets.FRONTEND_PRIVATE_IP }}
        run: |
          set -euo pipefail
          RSYNC_SSH="ssh -i ~/.ssh/ansible_key -o StrictHostKeyChecking=yes"
          SSH_CMD="ssh -i ~/.ssh/ansible_key -o StrictHostKeyChecking=yes"
          rsync -az --delete -e "$RSYNC_SSH" "FinTrack Frontend/build/" "$ANSIBLE_USER@$ANSIBLE_HOST:/tmp/fintrack-frontend/"
          $SSH_CMD "$ANSIBLE_USER@$ANSIBLE_HOST" "VM_USER='$VM_USER' FRONTEND_PRIVATE_IP='$FRONTEND_PRIVATE_IP' bash -s" <<'REMOTE'
          set -euo pipefail
          rsync -az --delete -e "ssh -o StrictHostKeyChecking=no" /tmp/fintrack-frontend/ "$VM_USER@$FRONTEND_PRIVATE_IP:/tmp/fintrack/"
          ssh -o StrictHostKeyChecking=no "$VM_USER@$FRONTEND_PRIVATE_IP" 'sudo mkdir -p /var/www/fintrack && sudo rsync -a --delete /tmp/fintrack/ /var/www/fintrack/ && sudo chown -R www-data:www-data /var/www/fintrack && sudo systemctl restart nginx && curl -fsS http://127.0.0.1/healthz'
          REMOTE