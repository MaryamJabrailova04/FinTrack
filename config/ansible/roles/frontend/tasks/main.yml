---
- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present

- name: Create frontend web root
  ansible.builtin.file:
    path: "{{ frontend_root }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"

- name: Configure frontend nginx site
  ansible.builtin.template:
    src: fintrack-nginx.conf.j2
    dest: /etc/nginx/sites-available/fintrack
    mode: "0644"
  notify: Restart nginx

- name: Enable frontend nginx site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/fintrack
    dest: /etc/nginx/sites-enabled/fintrack
    state: link
    force: true
  notify: Restart nginx

- name: Remove default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Restart nginx

- name: Ensure nginx is running
  ansible.builtin.service:
    name: nginx
    state: started
    enabled: true
