---
- name: Install backend packages
  ansible.builtin.apt:
    name:
      - nginx
      - python3
      - python3-venv
      - python3-pip
      - unixodbc
      - unixodbc-dev
    state: present

- name: Install Microsoft package signing key
  ansible.builtin.shell: |
    set -e
    curl -fsSL https://packages.microsoft.com/keys/microsoft.asc | gpg --dearmor -o /usr/share/keyrings/microsoft-prod.gpg
  args:
    creates: /usr/share/keyrings/microsoft-prod.gpg

- name: Add Microsoft Ubuntu repository for ODBC Driver 18
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-prod.gpg] https://packages.microsoft.com/ubuntu/22.04/prod jammy main"
    filename: microsoft-prod
    state: present

- name: Install ODBC Driver 18 for SQL Server
  ansible.builtin.apt:
    name: msodbcsql18
    state: present
    update_cache: true
  environment:
    ACCEPT_EULA: "Y"

- name: Create application directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"
  loop:
    - /opt/fintrack
    - "{{ backend_root }}"
    - /etc/fintrack

- name: Create Python virtual environment
  ansible.builtin.command: python3 -m venv {{ backend_venv }}
  args:
    creates: "{{ backend_venv }}/bin/activate"

- name: Render backend environment file
  ansible.builtin.template:
    src: fintrack.env.j2
    dest: /etc/fintrack/fintrack.env
    owner: root
    group: www-data
    mode: "0640"
  notify: Restart backend

- name: Install backend systemd service
  ansible.builtin.template:
    src: fintrack-backend.service.j2
    dest: /etc/systemd/system/fintrack-backend.service
    mode: "0644"
  notify: Restart backend

- name: Configure backend nginx site
  ansible.builtin.template:
    src: fintrack-backend-nginx.conf.j2
    dest: /etc/nginx/sites-available/fintrack-backend
    mode: "0644"
  notify: Restart nginx

- name: Enable backend nginx site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/fintrack-backend
    dest: /etc/nginx/sites-enabled/fintrack-backend
    state: link
    force: true
  notify: Restart nginx

- name: Remove default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: Restart nginx

- name: Enable backend service
  ansible.builtin.systemd:
    name: fintrack-backend
    enabled: true
    daemon_reload: true
