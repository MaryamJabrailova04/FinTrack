---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install base packages
  ansible.builtin.apt:
    name:
      - curl
      - unzip
      - git
      - ca-certificates
      - gnupg
      - software-properties-common
    state: present

- name: Enable unattended security updates
  ansible.builtin.apt:
    name: unattended-upgrades
    state: present